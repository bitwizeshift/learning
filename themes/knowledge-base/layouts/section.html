{{ define "main" }}
<div class="container">
  <header class="page-head">
    <h1 class="page-head__title">{{ .Title }}</h1>
    {{ with .Content }}<div class="prose">{{ . }}</div>{{ end }}
  </header>
  <div class="post-rows">
    {{ range partial "order-posts.html" .RegularPagesRecursive }}
      {{ partial "post-list.html" . }}
    {{ end }}
  </div>
</div>
{{ end }}
