# Theme-level defaults. A site using this theme should also declare the
# [taxonomies] block (taxonomies must be declared by the site to take effect).

[taxonomies]
  concept   = 'concepts'
  resource  = 'resources'
  toolchain = 'toolchains'

# Posts live in content/posts/<focus-term>/. Drop the leading "posts" section so
# a post's URL is /<focus-term>/<name>/, where <name> is the front-matter `slug`
# if set, otherwise the filename. Set `slug = '<id>'` to get /<focus-term>/<id>/.
[permalinks]
  [permalinks.page]
    posts = '/:sections[1:]/:slugorcontentbasename/'

[markup]
  [markup.highlight]
    noClasses   = false   # emit CSS classes so light/dark can be themed statically
    codeFences  = true
    guessSyntax = true
    tabWidth    = 4
  [markup.goldmark.renderer]
    unsafe = true          # allow inline HTML (SVG sprite, <details>) in content
  [markup.tableOfContents]
    startLevel = 2
    endLevel   = 3

[module]
  [module.hugoVersion]
    extended = false
    min = '0.146.0'
