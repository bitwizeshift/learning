# The extensibility backbone: enumerates the archetype dimensions themselves.
# Add a [[dimension]] here (plus a matching data file + taxonomy) to introduce a
# brand-new kind of archetype with NO template changes.
#
#   taxonomy  : the Hugo taxonomy key (must exist in [taxonomies])
#   title     : display heading used in nav + home page
#   data      : name of the site.Data file holding per-term metadata
#   icon      : sprite symbol for the dimension itself (home group heading)
#   inNav     : render as a top-level nav dropdown
#   composite : generate composite intersection pages crossing the `cross` dimension
#   cross     : this dimension is the one every composite page is crossed against
#   weight    : ordering

[[dimension]]
  taxonomy  = "types"
  title     = "Type"
  data      = "types"
  icon      = "type"
  inNav     = true
  composite = true
  weight    = 10

[[dimension]]
  taxonomy  = "kinds"
  title     = "Kind"
  data      = "kinds"
  icon      = "kind"
  inNav     = true
  composite = true
  weight    = 20

[[dimension]]
  taxonomy  = "toolchains"
  title     = "Toolchain"
  data      = "toolchains"
  icon      = "toolchain"
  inNav     = false
  cross     = true
  weight    = 30
